<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curling Vote — Display</title>
<style>
  :root {
    --bg:      #080e1c;
    --bg2:     #0f1a2e;
    --ice:     #4fc3f7;
    --ice2:    #81d4fa;
    --slate:   #1e2d45;
    --text:    #e8f4f8;
    --muted:   #7a9ab5;
    --gold:    #ffd700;
    --guard:   #4db6ac;
    --draw:    #7986cb;
    --takeout: #ef5350;
    --in:      #66bb6a;
    --out:     #ffa726;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    background: var(--bg2);
    border-bottom: 2px solid var(--ice);
  }
  .logo {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--ice);
    text-transform: uppercase;
  }
  .logo span { color: var(--text); }
  .sheet-tabs {
    display: flex;
    gap: 8px;
  }
  .sheet-tab {
    padding: 6px 18px;
    border: 2px solid var(--slate);
    border-radius: 6px;
    background: var(--slate);
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .sheet-tab.active {
    border-color: var(--ice);
    color: var(--ice);
    background: rgba(79,195,247,.08);
  }
  .sheet-tab.voting { border-color: var(--gold); color: var(--gold); }
  .sheet-tab.result { border-color: #66bb6a; color: #66bb6a; }

  /* ─── Main content ────────────────────────── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 32px;
    overflow: hidden;
  }

  /* ─── Grid (multi-sheet) ─────────────────── */
  .grid {
    display: grid;
    gap: 20px;
    width: 100%;
    height: 100%;
  }
  .grid.s1  { grid-template-columns: 1fr; }
  .grid.s2  { grid-template-columns: 1fr 1fr; }
  .grid.s3, .grid.s4 { grid-template-columns: 1fr 1fr; }
  .grid.s3 .sheet-card:last-child { grid-column: span 2; }

  /* ─── Sheet card ──────────────────────────── */
  .sheet-card {
    background: var(--bg2);
    border: 2px solid var(--slate);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: border-color .4s;
  }
  .sheet-card.voting { border-color: var(--ice); }
  .sheet-card.result { border-color: var(--gold); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: rgba(255,255,255,.03);
    border-bottom: 1px solid var(--slate);
  }
  .card-title {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ice);
  }
  .round-badge {
    font-size: .75rem;
    color: var(--muted);
    font-weight: 600;
  }
  .voter-count {
    font-size: .75rem;
    color: var(--muted);
  }

  .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 20px;
    gap: 10px;
  }

  /* ─── Idle state ──────────────────────────── */
  .idle-text {
    font-size: 1rem;
    color: var(--muted);
    text-align: center;
    font-style: italic;
  }

  /* ─── Voting state ────────────────────────── */
  .vote-layout {
    display: flex;
    gap: 24px;
    width: 100%;
    align-items: flex-start;
  }
  .vote-bars {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .category-block { width: 100%; }
  .cat-label {
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
  }
  .bar-label {
    font-size: .8rem;
    font-weight: 600;
    width: 90px;
    flex-shrink: 0;
    color: var(--text);
  }
  .bar-track {
    flex: 1;
    height: 20px;
    background: var(--slate);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width .5s ease;
    width: 0%;
  }
  .bar-fill.guard   { background: var(--guard); }
  .bar-fill.draw    { background: var(--draw); }
  .bar-fill.takeout { background: var(--takeout); }
  .bar-fill.in      { background: var(--in); }
  .bar-fill.out     { background: var(--out); }
  .bar-fill.l12     { background: #ab47bc; }
  .bar-fill.l8      { background: #7e57c2; }
  .bar-fill.l4      { background: #5c6bc0; }
  .bar-fill.l2      { background: #42a5f5; }
  .bar-meta {
    font-size: .75rem;
    color: var(--muted);
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ─── Countdown circle ────────────────────── */
  .countdown-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  /* rotation applied per-element, not the whole SVG, so the number stays upright */
  .countdown-bg { fill: none; stroke: var(--slate); }
  .countdown-ring {
    fill: none;
    stroke-linecap: round;
    transition: stroke-dashoffset .9s linear, stroke .5s;
  }
  .countdown-num {
    font-size: 1.5rem;
    font-weight: 900;
    fill: var(--text);
    text-anchor: middle;
    dominant-baseline: central;
  }
  .countdown-label {
    font-size: .6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  /* ─── Result state ────────────────────────── */
  .result-card {
    text-align: center;
    animation: fadeIn .5s ease;
  }
  .result-label {
    font-size: .7rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .result-shot {
    font-size: clamp(4rem, 8vw, 13rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: .04em;
    line-height: 1.1;
    text-shadow: 0 0 50px rgba(255,215,0,.55);
  }
  .result-sub {
    font-size: clamp(1.5rem, 3vw, 4.5rem);
    color: var(--ice);
    margin-top: 8px;
    font-weight: 700;
  }
  .waiting-pill {
    margin-top: 12px;
    display: inline-block;
    padding: 5px 16px;
    border: 1px solid var(--muted);
    border-radius: 20px;
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .08em;
    animation: pulse 2s ease-in-out infinite;
  }

  /* ─── QR / connect footer ─────────────────── */
  footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 10px 32px;
    background: var(--bg2);
    border-top: 1px solid var(--slate);
  }
  .qr-img { width: 54px; height: 54px; border-radius: 6px; cursor: pointer; transition: opacity .15s; }
  .qr-img:hover { opacity: .8; }

  /* ─── QR modal ────────────────────────────── */
  #qr-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    cursor: pointer;
  }
  #qr-modal.open { display: flex; }
  #qr-modal img { width: min(80vw, 80vh); height: min(80vw, 80vh); border-radius: 12px; image-rendering: pixelated; cursor: default; }
  #qr-modal .modal-url { font-size: 1rem; color: var(--ice); font-family: monospace; }
  #qr-modal .modal-hint { font-size: .75rem; color: var(--muted); }
  @media print {
    body > *:not(#qr-modal) { display: none !important; }
    #qr-modal { display: flex !important; background: #fff; position: static; }
    #qr-modal img { width: 70vmin; height: 70vmin; }
    #qr-modal .modal-url { color: #000; font-size: 1.2rem; }
    #qr-modal .modal-hint { display: none; }
  }
  .connect-info { }
  .connect-label {
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
  }
  .connect-url {
    font-size: .9rem;
    font-weight: 700;
    color: var(--ice);
    font-family: monospace;
  }

  /* ─── Setup overlay ───────────────────────── */
  #setup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,14,28,.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    font-size: 1.4rem;
    color: var(--muted);
    font-style: italic;
    text-align: center;
    gap: 12px;
    flex-direction: column;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--slate);
    border-top-color: var(--ice);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .stone-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .stone-color-label {
    font-size: .9rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes pulse { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
</style>
</head>
<body>

<!-- QR modal -->
<div id="qr-modal" onclick="closeQRModal()">
  <img id="qr-modal-img" src="" alt="QR Code" onclick="event.stopPropagation()">
  <div class="modal-url" id="qr-modal-url"></div>
  <div class="modal-hint">Click anywhere to close &nbsp;·&nbsp; <span style="cursor:pointer;text-decoration:underline" onclick="event.stopPropagation();window.print()">Print</span></div>
</div>

<div id="setup-overlay">
  <div class="spinner"></div>
  <div>Waiting for admin to configure sheets…</div>
</div>

<header>
  <div class="logo">Curling <span>Vote</span></div>
  <div class="sheet-tabs" id="sheet-tabs"></div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <img class="qr-img" id="qr-img" src="" alt="QR Code">
  <div class="connect-info">
    <div class="connect-label">Scan to vote</div>
    <div class="connect-url" id="connect-url">—</div>
  </div>
</footer>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io({ query: { role: 'display' } });

let sheetNames = [];
let sheetsData  = {};   // sheetId → public state
let categories  = {};
let lineData    = {};   // sheetId → { positions: [], avg: null }

// ─── Socket events ─────────────────────────────────────────────────────────────

socket.on('init', data => {
  categories = data.categories;
  if (data.setup) {
    applySetup(data.sheetNames, data.sheets);
  }
  if (data.qr) applyQR(data.qr);
});

socket.on('setup-complete', ({ sheetNames: names, sheets }) => {
  applySetup(names, sheets);
});

socket.on('state-update', sheet => {
  sheetsData[sheet.sheetId] = sheet;
  renderSheet(sheet.sheetId);
  updateTab(sheet.sheetId);
});

socket.on('votes-update', ({ sheetId, votes, totalVoters }) => {
  if (!sheetsData[sheetId]) return;
  sheetsData[sheetId].votes = votes;
  sheetsData[sheetId].totalVoters = totalVoters;
  renderVoteBars(sheetId);
  const el = document.querySelector(`#card-${sheetId} .voter-count`);
  if (el) el.textContent = `${totalVoters} voter${totalVoters !== 1 ? 's' : ''}`;
});

socket.on('timer-tick', ({ sheetId, timeRemaining }) => {
  if (!sheetsData[sheetId]) return;
  sheetsData[sheetId].timeRemaining = timeRemaining;
  updateCountdown(sheetId);
});

socket.on('qr-update', applyQR);

socket.on('line-update', ({ sheetId, positions, avg }) => {
  lineData[sheetId] = { positions, avg };
  updateLineDistrib(sheetId);
});

socket.on('full-reset', () => {
  sheetsData = {};
  sheetNames = [];
  lineData = {};
  document.getElementById('setup-overlay').style.display = 'flex';
  document.getElementById('grid').innerHTML = '';
  document.getElementById('sheet-tabs').innerHTML = '';
});

// ─── Setup ─────────────────────────────────────────────────────────────────────

function applySetup(names, sheets) {
  sheetNames = names;
  sheetsData = {};
  for (const s of sheets) sheetsData[s.sheetId] = s;
  buildGrid();
  buildTabs();
  document.getElementById('setup-overlay').style.display = 'none';
}

function applyQR(qr) {
  document.getElementById('qr-img').src = qr.dataUrl;
  document.getElementById('qr-modal-img').src = qr.dataUrl;
  document.getElementById('qr-modal-url').textContent = qr.url;
  // Show base URL without token for cleanliness — actual URL is in the QR
  const base = qr.url.split('/vote')[0];
  document.getElementById('connect-url').textContent = base + '/vote';
}

function closeQRModal() {
  document.getElementById('qr-modal').classList.remove('open');
}

document.getElementById('qr-img').addEventListener('click', () => {
  document.getElementById('qr-modal').classList.add('open');
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeQRModal();
});

// ─── Grid ───────────────────────────────────────────────────────────────────────

function buildGrid() {
  const grid = document.getElementById('grid');
  const n = sheetNames.length;
  grid.className = `grid s${Math.min(n, 4)}`;
  grid.innerHTML = '';
  for (const id of sheetNames) {
    const card = buildCard(id);
    grid.appendChild(card);
  }
}

function buildTabs() {
  const tabs = document.getElementById('sheet-tabs');
  tabs.innerHTML = '';
  for (const id of sheetNames) {
    const btn = document.createElement('button');
    btn.className = 'sheet-tab';
    btn.textContent = `Sheet ${id}`;
    btn.id = `tab-${id}`;
    tabs.appendChild(btn);
    updateTab(id);
  }
}

function updateTab(sheetId) {
  const btn = document.getElementById(`tab-${sheetId}`);
  if (!btn) return;
  const s = sheetsData[sheetId];
  btn.className = 'sheet-tab' + (s ? ` ${s.phase}` : '');
}

// ─── Card ───────────────────────────────────────────────────────────────────────

function buildCard(sheetId) {
  const s = sheetsData[sheetId] || { phase: 'idle', round: 0, totalVoters: 0 };
  const card = document.createElement('div');
  card.className = `sheet-card ${s.phase}`;
  card.id = `card-${sheetId}`;
  card.innerHTML = `
    <div class="card-header">
      <div class="card-title">Sheet ${sheetId}</div>
      <div class="round-badge" id="round-${sheetId}">Stone ${s.round || '—'}</div>
      <div class="voter-count" id="voters-${sheetId}">${s.totalVoters || 0} voters</div>
    </div>
    <div class="card-body" id="body-${sheetId}"></div>
  `;
  renderBody(sheetId, card.querySelector(`#body-${sheetId}`));
  return card;
}

function stoneColorCSS(color) {
  const map = { red:'#ef5350', yellow:'#ffd700', blue:'#42a5f5', black:'#444', green:'#66bb6a', white:'#e8f4f8' };
  return map[color] || '#888';
}

function renderSheet(sheetId) {
  const card = document.getElementById(`card-${sheetId}`);
  if (!card) return;
  const s = sheetsData[sheetId];
  card.className = `sheet-card ${s.phase}`;
  document.getElementById(`round-${sheetId}`).textContent = `Stone ${s.round || '—'}`;
  document.getElementById(`voters-${sheetId}`).textContent = `${s.totalVoters} voter${s.totalVoters !== 1 ? 's' : ''}`;
  renderBody(sheetId, document.getElementById(`body-${sheetId}`));
}

function colorLabel(c) {
  return ({red:'Red',yellow:'Yellow',blue:'Blue',black:'Black',green:'Green',white:'White'})[c] || c;
}

function stoneSize() {
  const n = sheetNames.length;
  return n === 1 ? 130 : n === 2 ? 100 : 76;
}

function stoneGraphicHTML(color, size) {
  const css = stoneColorCSS(color);
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" style="display:block;filter:drop-shadow(0 6px 18px rgba(0,0,0,.6))">
    <circle cx="52" cy="53" r="44" fill="rgba(0,0,0,.3)"/>
    <circle cx="50" cy="50" r="44" fill="${css}" stroke="rgba(0,0,0,.2)" stroke-width="1.5"/>
    <ellipse cx="37" cy="34" rx="13" ry="9" fill="rgba(255,255,255,.28)"/>
    <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
  </svg>`;
}

function renderBody(sheetId, container) {
  const s = sheetsData[sheetId];
  if (!s || s.phase === 'idle') {
    container.innerHTML = `<div class="idle-text">Waiting for next stone…</div>`;
    return;
  }
  if (s.phase === 'voting') {
    container.innerHTML = buildVotingHTML(sheetId);
    updateCountdown(sheetId);
    return;
  }
  if (s.phase === 'result') {
    container.innerHTML = buildResultHTML(s);
    return;
  }
}

// ─── House SVG helper ───────────────────────────────────────────────────────────

const D_CX = 50, D_CY = 50, D_SCALE = 46;

function displayHouseRingsHTML() {
  return [
    { r: 46,   fill: '#0d2d50' },
    { r: 30.7, fill: '#c8dff0' },
    { r: 15.3, fill: '#9b1c1c' },
    { r: 3.8,  fill: '#c8dff0' },
  ].map(({r, fill}) =>
    `<circle cx="${D_CX}" cy="${D_CY}" r="${r}" fill="${fill}" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>`
  ).join('') +
  `<circle cx="${D_CX}" cy="${D_CY}" r="1.5" fill="#9b1c1c"/>` +
  `<line x1="${D_CX-D_SCALE}" y1="${D_CY}" x2="${D_CX+D_SCALE}" y2="${D_CY}" stroke="rgba(255,255,255,.45)" stroke-width=".8"/>` +
  [15.3, 30.7].flatMap(r => [D_CX - r, D_CX + r]).map(x =>
    `<line x1="${x.toFixed(1)}" y1="${(D_CY-2.5).toFixed(1)}" x2="${x.toFixed(1)}" y2="${(D_CY+2.5).toFixed(1)}" stroke="rgba(255,255,255,.35)" stroke-width=".6"/>`
  ).join('') +
  `<text x="${D_CX}" y="${D_CY+8}" text-anchor="middle" font-size="4" fill="rgba(255,255,255,.55)">Ctr</text>` +
  [[15.3,"4'"],[30.7,"8'"],[46,"12'"]].map(([r,l]) =>
    `<text x="${(D_CX+r).toFixed(1)}" y="${D_CY+8}" text-anchor="middle" font-size="4" fill="rgba(255,255,255,.55)">${l}</text>` +
    `<text x="${(D_CX-r).toFixed(1)}" y="${D_CY+8}" text-anchor="middle" font-size="4" fill="rgba(255,255,255,.55)">${l}</text>`
  ).join('');
}

function lineHouseVotingHTML(sheetId) {
  const ld = lineData[sheetId] || { positions: [], avg: null };
  const dotsHTML = ld.positions.map(p => {
    const cx = (D_CX + p * D_SCALE).toFixed(1);
    return `<circle cx="${cx}" cy="${D_CY}" r="2" fill="rgba(79,195,247,.8)"/>`;
  }).join('');
  const avgX = ld.avg !== null ? (D_CX + ld.avg * D_SCALE).toFixed(1) : null;
  const avgHTML = avgX
    ? `<line x1="${avgX}" y1="${D_CY-6}" x2="${avgX}" y2="${D_CY+6}" stroke="#ffd700" stroke-width="1.5" id="lavg-${sheetId}"/>`
    : `<line x1="-999" y1="${D_CY-6}" x2="-999" y2="${D_CY+6}" stroke="#ffd700" stroke-width="1.5" id="lavg-${sheetId}"/>`;
  const n = sheetNames.length;
  const sz = n === 1 ? 240 : n === 2 ? 200 : 160;
  return `<svg id="ldbar-${sheetId}" viewBox="0 0 100 100" width="${sz}" height="${sz}" style="display:block;overflow:visible">
    ${displayHouseRingsHTML()}
    <g id="voter-dots-${sheetId}">${dotsHTML}</g>
    ${avgHTML}
  </svg>
  <div style="font-size:.55rem;color:var(--muted);text-align:center;margin-top:2px" id="lcount-${sheetId}">${ld.positions.length} vote${ld.positions.length !== 1 ? 's' : ''}</div>`;
}

// ─── Voting HTML ────────────────────────────────────────────────────────────────

const colorMap = {
  guard: 'guard', draw: 'draw', takeout: 'takeout',
  in: 'in', out: 'out',
};

function buildVotingHTML(sheetId) {
  const s = sheetsData[sheetId];
  const r = 34, circ = 2 * Math.PI * r;

  let barsHTML = '';
  for (const [catKey, cat] of Object.entries(categories)) {
    barsHTML += `<div class="category-block"><div class="cat-label">${cat.label}</div>`;
    if (cat.continuous) {
      barsHTML += `<div style="display:flex;flex-direction:column;align-items:center">${lineHouseVotingHTML(sheetId)}</div>`;
    } else {
      const total = Object.values(s.votes[catKey]).reduce((a,b) => a+b, 0);
      for (const opt of cat.options) {
        const count = s.votes[catKey][opt] || 0;
        const pct   = total > 0 ? Math.round(count / total * 100) : 0;
        const cls   = colorMap[opt] || '';
        barsHTML += `
          <div class="bar-row">
            <div class="bar-label">${cat.labels[opt]}</div>
            <div class="bar-track">
              <div class="bar-fill ${cls}" id="bar-${sheetId}-${catKey}-${opt}" style="width:${pct}%"></div>
            </div>
            <div class="bar-meta" id="meta-${sheetId}-${catKey}-${opt}">${count} <span style="color:#4a6a85">(${pct}%)</span></div>
          </div>`;
      }
    }
    barsHTML += `</div>`;
  }

  const stoneHTML = s.stoneColor && s.round > 0
    ? `<div class="stone-area">
        ${stoneGraphicHTML(s.stoneColor, stoneSize())}
        <div class="stone-color-label" style="color:${stoneColorCSS(s.stoneColor)}">${colorLabel(s.stoneColor)} Stones</div>
      </div>` : '';

  return `
    <div style="width:100%;display:flex;flex-direction:column;align-items:center;gap:10px">
      ${stoneHTML}
      <div class="vote-layout" style="width:100%">
        <div class="vote-bars">${barsHTML}</div>
        <div class="countdown-wrap">
        <svg class="countdown-svg" width="90" height="90" viewBox="0 0 90 90">
          <circle class="countdown-bg" cx="45" cy="45" r="${r}" stroke-width="8" transform="rotate(-90 45 45)"/>
          <circle class="countdown-ring" id="ring-${sheetId}"
            cx="45" cy="45" r="${r}" stroke-width="8"
            stroke-dasharray="${circ}"
            stroke-dashoffset="0"
            stroke="#4fc3f7"
            transform="rotate(-90 45 45)"/>
          <text class="countdown-num" id="cnum-${sheetId}" x="45" y="45">${s.timeRemaining}</text>
        </svg>
        <div class="countdown-label">seconds</div>
      </div>
    </div>
    </div>`;
}

function renderVoteBars(sheetId) {
  const s = sheetsData[sheetId];
  if (!s || s.phase !== 'voting') return;
  for (const [catKey, cat] of Object.entries(categories)) {
    if (cat.continuous) continue;  // line handled by updateLineDistrib
    const total = Object.values(s.votes[catKey]).reduce((a,b) => a+b, 0);
    for (const opt of cat.options) {
      const count = s.votes[catKey][opt] || 0;
      const pct   = total > 0 ? Math.round(count / total * 100) : 0;
      const bar   = document.getElementById(`bar-${sheetId}-${catKey}-${opt}`);
      const meta  = document.getElementById(`meta-${sheetId}-${catKey}-${opt}`);
      if (bar)  bar.style.width = pct + '%';
      if (meta) meta.innerHTML = `${count} <span style="color:#4a6a85">(${pct}%)</span>`;
    }
  }
}

function updateLineDistrib(sheetId) {
  const s = sheetsData[sheetId];
  if (!s || s.phase !== 'voting') return;
  const ld = lineData[sheetId] || { positions: [], avg: null };

  const dotsG = document.getElementById(`voter-dots-${sheetId}`);
  if (dotsG) {
    dotsG.innerHTML = ld.positions.map(p => {
      const cx = (D_CX + p * D_SCALE).toFixed(1);
      return `<circle cx="${cx}" cy="${D_CY}" r="2" fill="rgba(79,195,247,.8)"/>`;
    }).join('');
  }

  const avgLine = document.getElementById(`lavg-${sheetId}`);
  if (avgLine) {
    const x = ld.avg !== null ? (D_CX + ld.avg * D_SCALE).toFixed(1) : '-999';
    avgLine.setAttribute('x1', x);
    avgLine.setAttribute('x2', x);
  }

  const countEl = document.getElementById(`lcount-${sheetId}`);
  if (countEl) countEl.textContent = `${ld.positions.length} vote${ld.positions.length !== 1 ? 's' : ''}`;
}

function updateCountdown(sheetId) {
  const s = sheetsData[sheetId];
  if (!s) return;
  const ring = document.getElementById(`ring-${sheetId}`);
  const num  = document.getElementById(`cnum-${sheetId}`);
  if (!ring || !num) return;

  const r    = 34;
  const circ = 2 * Math.PI * r;
  const pct  = s.countdown > 0 ? s.timeRemaining / s.countdown : 0;
  ring.style.strokeDashoffset = circ * (1 - pct);

  const t = s.timeRemaining;
  ring.style.stroke = t > 10 ? '#4fc3f7' : t > 5 ? '#ffd700' : '#ef5350';
  num.textContent = t;
}

// ─── Result HTML ────────────────────────────────────────────────────────────────

const shotLabels = {
  guard: 'Guard', draw: 'Draw', takeout: 'Takeout',
  in: 'In Turn (L)', out: 'Out Turn (R)',
};

function formatLineResult(pos) {
  if (pos === null || pos === undefined) return '—';
  const totalFt = pos * 12;
  const feet = Math.floor(totalFt);
  const inches = Math.round((totalFt - feet) * 12);
  return inches > 0 ? `${feet}' ${inches}"` : `${feet}'`;
}

function resultHouseHTML(linePos, handle, size) {
  if (linePos === null || linePos === undefined) return '';
  const side = handle === 'in' ? -1 : 1;
  const cx = (D_CX + side * linePos * D_SCALE).toFixed(1);
  const ftStr = formatLineResult(linePos);
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" style="display:block;overflow:visible">
    <defs>
      <filter id="res-glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    ${displayHouseRingsHTML()}
    <circle cx="${cx}" cy="${D_CY}" r="5" fill="#ffd700" stroke="#fff" stroke-width=".8" filter="url(#res-glow)"/>
    <text x="${cx}" y="${D_CY - 9}" text-anchor="middle" font-size="5" fill="#ffd700" font-weight="bold">${ftStr}</text>
  </svg>`;
}

function buildResultHTML(s) {
  const w = s.winners;
  const type   = w.type   ? shotLabels[w.type]   : '—';
  const handle = w.handle ? shotLabels[w.handle] : '—';

  const n = sheetNames.length;
  const stoneSz = n === 1 ? 160 : n === 2 ? 120 : 90;
  const houseSz = n === 1 ? 480 : n === 2 ? 360 : 270;

  const stoneEl = s.stoneColor && s.round > 0
    ? `<div class="stone-area" style="margin-bottom:6px">
        ${stoneGraphicHTML(s.stoneColor, stoneSz)}
        <div class="stone-color-label" style="color:${stoneColorCSS(s.stoneColor)}">${colorLabel(s.stoneColor)} Stones</div>
      </div>` : '';

  const houseEl = resultHouseHTML(w.line, w.handle, houseSz);

  return `<div class="result-card">
    ${stoneEl}
    <div class="result-label">The crowd has spoken</div>
    <div class="result-shot">${type}</div>
    <div class="result-sub">${handle}</div>
    ${houseEl ? `<div style="display:flex;justify-content:center;margin-top:10px">${houseEl}</div>` : ''}
    <div class="waiting-pill">Waiting for next stone…</div>
  </div>`;
}
</script>
</body>
</html>
